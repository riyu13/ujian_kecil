
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;
  --bg2:#1a1d27;
  --bg3:#22263a;
  --border:#2e3350;
  --border2:#3d4466;
  --text:#e8eaf6;
  --text2:#9fa8da;
  --text3:#5c6bc0;
  --green:#00c896;
  --green2:#00966e;
  --green-bg:#0a2a20;
  --green-text:#00e5b0;
  --red:#ff5252;
  --red-bg:#2a0a0a;
  --red-text:#ff7070;
  --blue-bg:#0a1a2a;
  --blue-text:#64b5f6;
  --amber:#ffab40;
}
body{font-family:var(--font-sans,system-ui,sans-serif);background:var(--bg);color:var(--text);}
.wrap{padding:12px;max-width:480px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;}
.title{font-size:16px;font-weight:500;color:var(--text);}
.timer-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:15px;font-weight:500;color:var(--green);min-width:88px;text-align:center;letter-spacing:1px;}
.timer-box.warn{color:var(--red);background:var(--red-bg);border-color:#5a1a1a;}
.progress-bar{width:100%;height:3px;background:var(--bg3);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.soal-dot-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.soal-dot{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.soal-dot.answered{background:#0d2a1e;color:var(--green);border-color:var(--green2);}
.soal-dot.active{background:var(--green);color:#000;border-color:var(--green);font-weight:600;}
.soal-dot.correct-dot{background:#0d2a1e;border-color:var(--green);color:var(--green-text);}
.soal-dot.wrong-dot{background:var(--red-bg);border-color:var(--red);color:var(--red-text);}
.section-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.badge-moji{background:var(--blue-bg);color:var(--blue-text);border:1px solid #1a3a5a;}
.badge-dokkai{background:var(--green-bg);color:var(--green-text);border:1px solid #0a3a2a;}
.soal-num{font-size:12px;color:var(--text3);margin-bottom:4px;}
.soal-type{font-size:12px;color:var(--text2);margin-bottom:10px;font-style:italic;}
.soal-instruction{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6;background:var(--bg2);padding:10px 12px;border-radius:10px;border-left:3px solid var(--text3);}
.passage-box{background:var(--bg2);border-left:3px solid var(--green);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px;font-size:14px;line-height:2;color:var(--text);}
.soal-text{font-size:16px;color:var(--text);line-height:1.8;margin-bottom:14px;font-weight:400;}
.soal-text u{text-decoration-color:var(--amber);color:var(--amber);}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.opt{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:12px;cursor:pointer;background:var(--bg2);transition:all .15s;-webkit-tap-highlight-color:transparent;min-height:50px;}
.opt:active{transform:scale(0.98);}
.opt.selected{border-color:var(--green);background:#0d2a1e;}
.opt.correct{border-color:var(--green);background:#0d2a1e;}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt-label{font-size:13px;font-weight:600;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--text2);}
.opt.selected .opt-label{background:var(--green);color:#000;}
.opt.correct .opt-label{background:var(--green);color:#000;}
.opt.wrong .opt-label{background:var(--red);color:#fff;}
.opt-text{font-size:15px;color:var(--text);line-height:1.4;flex:1;}
.nav{display:flex;justify-content:space-between;align-items:center;gap:10px;padding-bottom:8px;}
.btn{padding:12px 18px;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);color:var(--text);font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;min-height:46px;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn-primary{background:var(--green);color:#000;border-color:var(--green);font-weight:600;}
.btn-primary:active{background:var(--green2);}
.explanation{margin-top:12px;padding:12px;background:var(--bg3);border-radius:12px;border-left:3px solid var(--green);font-size:13px;color:var(--text2);line-height:1.7;}
.result-card{text-align:center;padding:1.5rem 0.5rem;}
.result-score{font-size:56px;font-weight:600;color:var(--green);}
.result-label{font-size:14px;color:var(--text2);margin-top:6px;margin-bottom:1.5rem;line-height:1.6;}
.result-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1.5rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 8px;}
.stat-num{font-size:22px;font-weight:600;color:var(--text);}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.check-icon{font-size:14px;}
.nav-right{display:flex;gap:8px;}
</style>

  {id:9,section:"dokkai",type:"Dokkai — Alasan kejadian",instruction:"つぎの文章を読んで、質問に答えてください。",passage:"　昨日は雨が降っていたので、外でスポーツができませんでした。それで、家の中でゲームをしたり、映画を見たりしました。",question:"なぜ、外でスポーツができませんでしたか。",options:["体の具合が悪かったから","仕事があったから","雨が降っていたから","友達が来なかったから"],answer:2,explanation:"「雨が降っていたので」という理由があります。= Alasannya karena turun hujan."},
  {id:10,section:"dokkai",type:"Dokkai — Urutan kejadian",instruction:"つぎの文章を読んで、質問に答えてください。",passage:"　山田さんは今日、まずスーパーへ行って野菜と肉を買いました。次に銀行でお金をおろしました。そして最後に郵便局で手紙を出しました。",question:"山田さんが２番目にしたことは何ですか。",options:["郵便局で手紙を出した","スーパーで買い物をした","銀行でお金をおろした","家に帰った"],answer:2,explanation:"順番は：①スーパー→②銀行→③郵便局。２番目は銀行でお金をおろすことです。"},

  { id: 55, section: "dokkai", type: "Dokkai Pendek — Teks panjang", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　山田さんは毎日忙しい会社員です。朝は６時に起きて、急いで朝ごはんを食べます。それから電車に乗って会社へ行きます。会社では会議や仕事がたくさんあり、昼ごはんをゆっくり食べる時間もあまりありません。しかし、仕事が終わった後は、友達と食事に行ったり、家で映画を見たりしてリラックスします。", question: "山田さんは昼ごはんについてどうですか。", options: ["毎日ゆっくり食べる", "あまり食べない", "ゆっくり食べる時間がない", "食べない"], answer: 2, explanation: "ゆっくり食べる時間がない" },
  { id: 56, section: "dokkai", type: "Dokkai — Maksud penulis", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　私は最近、日本語の勉強を始めました。最初は漢字が難しくて大変でしたが、毎日少しずつ練習しているうちに、だんだん読めるようになりました。今では簡単な本も読めるようになり、とても嬉しいです。これからも続けていきたいと思っています。", question: "この人は今どう思っていますか。", options: ["勉強が嫌い", "もうやめたい", "嬉しい", "難しくて困っている"], answer: 2, explanation: "嬉しい" },
  { id: 57, section: "dokkai", type: "Dokkai — Informasi pengumuman", instruction: "つぎのお知らせを読んで、質問に答えてください。", passage: "　イベントのお知らせ\n日時：4月20日（日）午前10時〜午後3時\n場所：市民公園\n内容：フリーマーケットと音楽ライブ\n参加費：無料\n※雨の場合は中止になります。", question: "雨が降った場合、イベントはどうなりますか。", options: ["行う", "延期", "中止", "時間変更"], answer: 2, explanation: "雨の場合中止" },
  { id: 58, section: "dokkai", type: "Dokkai — Alasan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　昨日、私は友達と映画を見る約束をしていました。しかし、急に仕事が入ってしまったので、約束をキャンセルしなければなりませんでした。友達にはとても申し訳ないと思っています。", question: "なぜ映画を見に行きませんでしたか。", options: ["雨だった", "仕事があった", "体調が悪い", "忘れた"], answer: 1, explanation: "仕事" },
  { id: 59, section: "dokkai", type: "Dokkai — Urutan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　今日は朝起きてから、まずジョギングをしました。そのあとシャワーを浴びて、朝ごはんを食べました。そして仕事に行きました。", question: "ジョギングのあと何をしましたか。", options: ["仕事", "ごはん", "シャワー", "寝た"], answer: 2, explanation: "シャワー" },

  { id: 60, section: "dokkai", type: "Dokkai Pendek — Teks panjang", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　佐藤さんは新しい会社で働き始めました。最初は仕事に慣れなくて、とても大変でしたが、同僚が親切に教えてくれたので、少しずつできるようになりました。今では自分で仕事を進めることができるようになり、自信もついてきました。", question: "佐藤さんはどうなりましたか。", options: ["まだできない", "やめたい", "自信がついた", "変わらない"], answer: 2, explanation: "自信" },
  { id: 61, section: "dokkai", type: "Dokkai — Maksud penulis", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　最近、健康のために毎日歩くようにしています。最初は疲れて続けるのが大変でしたが、今では歩くことが楽しくなりました。体の調子もよくなり、続けてよかったと思っています。", question: "この人は歩くことについてどう思っていますか。", options: ["嫌い", "疲れるだけ", "楽しい", "意味がない"], answer: 2, explanation: "楽しい" },
  { id: 62, section: "dokkai", type: "Dokkai — Informasi pengumuman", instruction: "つぎのお知らせを読んで、質問に答えてください。", passage: "　図書館からのお知らせ\n開館時間：9時〜17時\n休館日：月曜日\n※本は一人5冊まで借りることができます。", question: "本は何冊まで借りられますか。", options: ["3冊", "4冊", "5冊", "6冊"], answer: 2, explanation: "5冊" },
  { id: 63, section: "dokkai", type: "Dokkai — Alasan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　今日はとても暑かったので、エアコンをつけました。しかし、電気代が高くなるので、あまり長く使わないようにしています。", question: "なぜエアコンをつけましたか。", options: ["寒い", "暑い", "疲れた", "暗い"], answer: 1, explanation: "暑い" },
  { id: 64, section: "dokkai", type: "Dokkai — Urutan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　朝起きて、顔を洗って、それから朝ごはんを食べました。そのあと学校へ行きました。", question: "朝ごはんのあと何をしましたか。", options: ["寝た", "学校へ行った", "顔を洗った", "テレビ"], answer: 1, explanation: "学校へ行く" },

  { id: 65, section: "dokkai", type: "Dokkai Pendek — Teks panjang", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　私は週末によく図書館へ行きます。図書館では静かに本を読むことができるので、とても集中できます。また、新しい本を見つけるのも楽しみの一つです。最近は日本語の本を読むようにしていて、勉強にもなっています。", question: "この人はなぜ図書館へ行きますか。", options: ["友達に会うため", "静かに勉強するため", "買い物するため", "運動するため"], answer: 1, explanation: "静かに勉強" },
  { id: 66, section: "dokkai", type: "Dokkai — Maksud penulis", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　私は将来、日本で働きたいと思っています。そのために、今日本語を一生懸命勉強しています。まだ難しいことも多いですが、あきらめずに頑張りたいです。", question: "この人の目標は何ですか。", options: ["日本へ旅行", "日本で働く", "日本語をやめる", "学校をやめる"], answer: 1, explanation: "働く" },
  { id: 67, section: "dokkai", type: "Dokkai — Informasi pengumuman", instruction: "つぎのお知らせを読んで、質問に答えてください。", passage: "　お知らせ\n試験日：7月10日\n時間：午前9時開始\n持ち物：鉛筆、消しゴム\n※遅れると受験できません。", question: "何を持っていかなければなりませんか。", options: ["ペンだけ", "鉛筆と消しゴム", "本", "水"], answer: 1, explanation: "鉛筆・消しゴム" },
  { id: 68, section: "dokkai", type: "Dokkai — Alasan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　昨日はとても疲れていたので、家に帰ってすぐ寝ました。テレビも見ませんでした。", question: "なぜすぐ寝ましたか。", options: ["忙しい", "疲れた", "寒い", "楽しい"], answer: 1, explanation: "疲れた" },
  { id: 69, section: "dokkai", type: "Dokkai — Urutan kejadian", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　スーパーへ行って、野菜を買って、そのあと家に帰りました。", question: "最後に何をしましたか。", options: ["買い物", "帰った", "料理", "食べた"], answer: 1, explanation: "帰る" },
  { id: 70, section: "dokkai", type: "Dokkai — Maksud penulis", instruction: "つぎの文章を読んで、質問に答えてください。", passage: "　私は毎日少しずつ日本語を勉強しています。忙しい日でも10分だけは勉強するようにしています。そのおかげで、少しずつ上達してきました。", question: "この人はどうやって上達しましたか。", options: ["長時間勉強", "毎日少しずつ", "学校に行く", "友達と話す"], answer: 1, explanation: "毎日少しずつ" }
  
];

let cur=0,answers=new Array(70).fill(null),revealed=new Array(70).fill(false),timerSec=3600,timerInterval,finished=false;

function pad(n){return String(n).padStart(2,'0');}
function fmt(s){return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60);}

function startTimer(){
  timerInterval=setInterval(()=>{
    if(finished)return;
    timerSec--;
    const el=document.getElementById('tmr');
    if(el){el.textContent=fmt(timerSec);if(timerSec<=300)el.className='timer-box warn';}
    if(timerSec<=0){clearInterval(timerInterval);showResult();}
  },1000);
}

function selectAnswer(i){if(revealed[cur])return;answers[cur]=i;render();}
function revealAnswer(){if(answers[cur]===null)return;revealed[cur]=true;render();}
function nextSoal(){if(cur<9){cur++;render();}else showResult();}
function prevSoal(){if(cur>0){cur--;render();}}
function goTo(i){cur=i;render();}
function showResult(){finished=true;clearInterval(timerInterval);render();}
function restart(){cur=0;answers=new Array(70).fill(null);revealed=new Array(70).fill(false);finished=false;timerSec=3600;startTimer();render();}

function render(){
  const app=document.getElementById('app');
  if(finished){
    const ok=answers.filter((a,i)=>a===soal[i].answer).length;
    const pct=Math.round(ok/70*100);
    const msg=pct>=70?'合格ライン達成！おめでとう！':'もう少し練習が必要です。頑張って！';
    app.innerHTML=`<div class="result-card">
      <div style="font-size:40px;margin-bottom:8px;">📋</div>
      <div class="result-score">${ok}/70</div>
      <div class="result-label">${pct}% — ${msg}</div>
      <div class="result-grid">
        <div class="stat-card"><div class="stat-num" style="color:#00c896">${ok}</div><div class="stat-lbl">Benar</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#ff5252">${70-ok}</div><div class="stat-lbl">Salah</div></div>
        <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Nilai</div></div>
      </div>
      <div class="soal-dot-row" style="justify-content:center;margin-bottom:20px">
        ${soal.map((s,i)=>{const c=answers[i]===s.answer?'correct-dot':'wrong-dot';return`<div class="soal-dot ${c}" onclick="cur=${i};finished=false;render()">${i+1}</div>`;}).join('')}
      </div>
      <button class="btn btn-primary" style="width:100%;font-size:15px;padding:14px" onclick="restart()">Ulangi Latihan</button>
    </div>`;
    return;
  }

  const s=soal[cur];
  const isRev=revealed[cur];
  const uAns=answers[cur];

  const dots=soal.map((x,i)=>{
    let c='';
    if(i===cur)c='active';
    else if(revealed[i])c=answers[i]===x.answer?'correct-dot':'wrong-dot';
    else if(answers[i]!==null)c='answered';
    return`<div class="soal-dot ${c}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');

  const passage=s.passage?`<div class="passage-box" style="white-space:pre-line">${s.passage}</div>`:'';

  const opts=s.options.map((o,i)=>{
    let c='';
    if(isRev){if(i===s.answer)c='correct';else if(i===uAns&&i!==s.answer)c='wrong';}
    else if(i===uAns)c='selected';
    const lbl=String.fromCharCode(65+i);
    return`<div class="opt ${c}" onclick="selectAnswer(${i})">
      <span class="opt-label">${lbl}</span>
      <span class="opt-text">${o}</span>
    </div>`;
  }).join('');

  const expl=isRev?`<div class="explanation">💡 ${s.explanation}</div>`:'';

  const revBtn=!isRev&&uAns!==null?`<button class="btn btn-primary" onclick="revealAnswer()">Cek Jawaban ✓</button>`:'';
  const nxtBtn=isRev?(cur<9?`<button class="btn btn-primary" onclick="nextSoal()">Berikutnya →</button>`:`<button class="btn btn-primary" onclick="showResult()">Lihat Hasil</button>`):'';
  const allDone=answers.every(a=>a!==null)&&!isRev&&!revBtn?`<button class="btn btn-primary" onclick="showResult()">Lihat Hasil</button>`:'';

  app.innerHTML=`
    <div class="header">
      <div class="title">JLPT N4 練習</div>
      <div class="timer-box${timerSec<=300?' warn':''}" id="tmr">${fmt(timerSec)}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(cur+1)*1.43}%"></div></div>
    <div class="soal-dot-row">${dots}</div>
    <span class="section-badge ${s.section==='moji'?'badge-moji':'badge-dokkai'}">${s.section==='moji'?'文字・語彙':'読解'}</span>
    <div class="soal-num">Soal ${cur+1} / 70 　 ${s.type}</div>
    <div class="soal-instruction">${s.instruction}</div>
    ${passage}
    <div class="soal-text">${s.question}</div>
    <div class="options">${opts}</div>
    ${expl}
    <div class="nav">
      <button class="btn" onclick="prevSoal()" ${cur===0?'disabled':''}>← Kembali</button>
      <div class="nav-right">${revBtn}${nxtBtn}${allDone}</div>
    </div>
  `;
}

render();
startTimer();
</script>
